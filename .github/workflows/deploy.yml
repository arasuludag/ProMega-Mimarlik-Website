name: Build & Deploy to cPanel

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Fired by a Sanity webhook on publish (see README) so client edits go live.
  repository_dispatch:
    types: [sanity-publish]

# Avoid overlapping deploys; let the latest win.
concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (Astro static)
        run: npm run build
        env:
          PUBLIC_SANITY_PROJECT_ID: ${{ secrets.PUBLIC_SANITY_PROJECT_ID }}
          PUBLIC_SANITY_DATASET: production

      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 185.149.100.26
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /public_html/
          # Removes old CRA files that no longer exist in dist/.
          # Safe after the first deploy since all files are Astro-managed.
          dangerous-clean-slate: false
