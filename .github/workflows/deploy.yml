name: Build & Deploy to cPanel

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Fired by a Sanity webhook on publish (see README) so client edits go live.
  repository_dispatch:
    types: [sanity-publish]

# Avoid overlapping deploys; let the latest win.
concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache Astro image builds
        uses: actions/cache@v4
        with:
          path: node_modules/.astro
          key: astro-images-${{ secrets.PUBLIC_SANITY_PROJECT_ID }}

      - name: Install dependencies
        run: npm ci

      - name: Build (Astro static)
        run: npm run build
        env:
          PUBLIC_SANITY_PROJECT_ID: ${{ secrets.PUBLIC_SANITY_PROJECT_ID }}
          PUBLIC_SANITY_DATASET: production

      - name: Deploy to cPanel via FTP (active mode)
        env:
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get install -y lftp
          # Active mode bypasses the passive port range problem on this cPanel server.
          lftp -e "
            set ftp:passive-mode true;
            set ftp:ssl-allow false;
            set net:timeout 60;
            set net:max-retries 3;
            set net:reconnect-interval-base 5;
            set mirror:parallel-transfer-count 8;
            set mirror:parallel-directories true;
            set mirror:use-pget-n 4;
            open ftp://185.149.100.26;
            user $FTP_USER $FTP_PASS;
            mirror --reverse --delete --ignore-time --verbose=1 --exclude='.ftp-deploy-sync-state.json' ./dist/ /public_html/;
            quit
          " 2>&1
